<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineGusto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e3d8;
    --text-muted: #7a7570;
    --red: #c0392b;
    --green: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.4; }
  header { padding: 2rem 2rem 1.2rem; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
  .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 0.05em; color: var(--gold); margin-bottom: 0.3rem; }
  .tagline { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; }
  .phase-dots { display: flex; justify-content: center; gap: 20px; }
  .phase-dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .phase-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .phase-dot.active { background: var(--gold); }
  .phase-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-style: italic; color: var(--text); margin-bottom: 0.4rem; }
  .section-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.8rem; line-height: 1.5; }
  .confidence-bar-wrap { margin-bottom: 2rem; padding: 1rem 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
  .confidence-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.6rem; letter-spacing: 0.05em; }
  .confidence-label span:last-child { color: var(--gold); }
  .confidence-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .confidence-fill { height: 100%; background: linear-gradient(90deg, #8b6914, var(--gold)); border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .cards-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
  @media(min-width:600px) { .cards-grid { grid-template-columns: 1fr 1fr; } }

  /* Movie card with poster */
  .movie-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.25s, transform 0.2s; position: relative; }
  .movie-card:hover { border-color: rgba(201,168,76,0.4); transform: translateX(2px); }
  .movie-card.seen { border-color: rgba(201,168,76,0.3); }
  .movie-card-inner { display: flex; gap: 0; }
  .movie-poster { width: 72px; min-width: 72px; background: var(--surface2); overflow: hidden; flex-shrink: 0; }
  .movie-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .movie-poster-placeholder { width: 100%; height: 100%; min-height: 110px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--border); }
  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); opacity: 0; transition: opacity 0.25s; }
  .movie-card.seen .card-accent { opacity: 1; }
  .card-content { flex: 1; padding: 1rem 1rem 0.8rem; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.8rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--text); margin-bottom: 0.12rem; }
  .card-meta { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.05em; }
  .card-genre { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.25rem; }
  .seen-toggle { flex-shrink: 0; padding: 0.35rem 0.8rem; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .seen-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .seen-toggle.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .rating-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.8rem; padding-top: 0.7rem; border-top: 1px solid var(--border); animation: fadeDown 0.25s ease; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .rating-label { font-size: 0.75rem; color: var(--text-muted); margin-right: 0.2rem; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; line-height: 1; transition: transform 0.15s; color: var(--border); padding: 2px; }
  .star-btn:hover, .star-btn.lit { color: var(--gold); }
  .star-btn:hover { transform: scale(1.25); }

  /* Rec cards */
  .rec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1rem; transition: border-color 0.25s; }
  .rec-card:hover { border-color: rgba(201,168,76,0.35); }
  .rec-card.already-seen { border-color: rgba(201,168,76,0.2); }
  .rec-top { display: flex; }
  .rec-poster { width: 80px; min-width: 80px; background: var(--surface2); overflow: hidden; flex-shrink: 0; }
  .rec-poster img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 120px; }
  .rec-poster-placeholder { width: 80px; min-height: 120px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: var(--border); }
  .rec-header { flex: 1; display: flex; justify-content: space-between; align-items: flex-start; padding: 1rem 1.2rem; cursor: pointer; }
  .rec-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 0.4rem; }
  .rec-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .badge { font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase; }
  .badge-type { background: var(--surface2); color: var(--text-muted); }
  .badge-why { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .badge-seen { background: rgba(39,174,96,0.15); color: var(--green); border: 1px solid rgba(39,174,96,0.3); }
  .rec-expand-icon { color: var(--text-muted); font-size: 0.85rem; transition: transform 0.25s; flex-shrink: 0; margin-top: 4px; }
  .rec-card.open .rec-expand-icon { transform: rotate(180deg); }
  .rec-body { padding: 0 1.2rem 1.2rem; display: none; animation: fadeDown 0.2s ease; border-top: 1px solid var(--border); margin: 0 1.2rem; padding-top: 1rem; }
  .rec-card.open .rec-body { display: block; }
  .rec-body p { font-size: 0.86rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 0.8rem; }
  .rec-body p strong { color: var(--text); font-weight: 400; }

  /* Already seen in recs */
  .already-seen-section { margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
  .already-seen-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .already-seen-stars { display: flex; align-items: center; gap: 0.4rem; }
  .already-seen-toggle { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; padding: 0.3rem 0.7rem; border: 1px solid var(--border); border-radius: 4px; background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.2s; margin-bottom: 0.6rem; }
  .already-seen-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .already-seen-toggle.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

  /* Watch actions */
  .watch-actions { display: flex; gap: 0.7rem; margin-top: 0.5rem; }
  .btn-watch { padding: 0.45rem 1.1rem; border-radius: 4px; font-size: 0.76rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
  .btn-yes { background: var(--green); color: #fff; border: 1px solid var(--green); }
  .btn-no { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-yes:hover { opacity: 0.85; }
  .btn-no:hover { border-color: var(--red); color: var(--red); }

  /* Buttons */
  .btn-primary { display: block; width: 100%; margin-top: 2rem; padding: 0.9rem; background: var(--gold); color: #0d0d0d; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .restart-link { display: inline-block; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted); text-decoration: underline; cursor: pointer; letter-spacing: 0.05em; background: none; border: none; font-family: 'DM Sans', sans-serif; }
  .saved-note { text-align: center; font-size: 0.72rem; color: #5a5550; margin-top: 0.8rem; letter-spacing: 0.05em; }

  /* Loading */
  .loading-wrap { text-align: center; padding: 3rem 1rem; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.2rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }
  .error-box { padding: 1rem 1.2rem; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); border-radius: 6px; font-size: 0.85rem; color: #e74c3c; margin-top: 1rem; }
</style>
</head>
<body>
<header>
  <div class="logo">CineGusto</div>
  <div class="tagline">Scopri il tuo prossimo film preferito</div>
  <div class="phase-dots">
    <div class="phase-dot-wrap"><div class="phase-dot active" id="dot1"></div><div class="phase-label">Scoperta</div></div>
    <div class="phase-dot-wrap"><div class="phase-dot" id="dot2"></div><div class="phase-label">Affinamento</div></div>
    <div class="phase-dot-wrap"><div class="phase-dot" id="dot3"></div><div class="phase-label">Consigli</div></div>
  </div>
</header>

<main id="app">
  <div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Caricamento...</div></div>
</main>

<script>
const STORAGE_KEY = 'cinegusto_v2';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w185';

function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }
function loadSaved() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }

const starterFilms = [
  { id: 's1', title: 'Il Padrino', year: 1972, genre: 'Crime · Drama', tmdb_id: 238 },
  { id: 's2', title: 'Inception', year: 2010, genre: 'Sci-Fi · Thriller', tmdb_id: 27205 },
  { id: 's3', title: 'Parasite', year: 2019, genre: 'Thriller · Drammatico', tmdb_id: 496243 },
  { id: 's4', title: 'The Grand Budapest Hotel', year: 2014, genre: 'Commedia · Avventura', tmdb_id: 120467 },
  { id: 's5', title: 'Interstellar', year: 2014, genre: 'Sci-Fi · Avventura', tmdb_id: 157336 }
];

const _saved = loadSaved();
const state = _saved || { round: 1, seenMovies: [], currentBatch: [], userChoices: {}, watchList: {}, alreadySeen: {}, finalRecs: null };

// ── API ──────────────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('/.netlify/functions/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: 'Sei un esperto cinematografico italiano. Rispondi SOLO con JSON valido, senza backtick, senza testo aggiuntivo.',
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const text = data.content.find(b => b.type === 'text')?.text || '';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function fetchPoster(tmdbId, mediaType) {
  try {
    const type = mediaType === 'Serie TV' ? 'tv' : 'movie';
    const res = await fetch(`/.netlify/functions/tmdb?id=${tmdbId}&type=${type}`);
    const data = await res.json();
    return data.poster_path ? TMDB_IMG + data.poster_path : null;
  } catch { return null; }
}

async function searchPoster(title, year, mediaType) {
  try {
    const type = mediaType === 'Serie TV' ? 'tv' : 'movie';
    const res = await fetch(`/.netlify/functions/tmdb?query=${encodeURIComponent(title)}&year=${year}&type=${type}`);
    const data = await res.json();
    return data.poster_path ? TMDB_IMG + data.poster_path : null;
  } catch { return null; }
}

// ── Confidence ───────────────────────────────────────────────────────────────
function calcConfidence() {
  if (state.round < 2) return Math.min(60, state.seenMovies.length * 12);
  return Math.min(100, state.seenMovies.length * 14 + (state.round - 1) * 8);
}

// ── Phase indicator ──────────────────────────────────────────────────────────
function setPhase(n) {
  for (let i = 1; i <= 3; i++) document.getElementById('dot' + i).classList.toggle('active', i <= n);
}

// ── Confidence bar HTML ──────────────────────────────────────────────────────
function confBarHtml() {
  const pct = calcConfidence();
  return `<div class="confidence-bar-wrap">
    <div class="confidence-label"><span>Profilo gusto</span><span>${pct}% completato</span></div>
    <div class="confidence-track"><div class="confidence-fill" style="width:${pct}%"></div></div>
  </div>`;
}

// ── Poster img HTML ──────────────────────────────────────────────────────────
function posterHtml(url, size) {
  if (url) return `<img src="${url}" alt="poster" loading="lazy">`;
  return `<div class="movie-poster-placeholder">🎬</div>`;
}

// ── Render rating phase ──────────────────────────────────────────────────────
function renderRatingPhase() {
  const choices = state.userChoices;
  const seenCount = state.currentBatch.filter(f => choices[f.id]?.seen).length;
  const ratedCount = state.currentBatch.filter(f => choices[f.id]?.seen && choices[f.id]?.rating).length;
  const canProceed = seenCount === 0 || ratedCount === seenCount;
  const conf = calcConfidence();
  const btnLabel = conf >= 70 ? '🎬 Scopri le raccomandazioni finali' : 'Continua — altri film →';

  const cards = state.currentBatch.map(f => {
    const c = choices[f.id] || {};
    const seen = !!c.seen;
    const rating = c.rating || 0;
    const poster = state.posters?.[f.id] || null;
    return `
    <div class="movie-card ${seen ? 'seen' : ''}" id="card-${f.id}">
      <div class="card-accent"></div>
      <div class="movie-card-inner">
        <div class="movie-poster">${posterHtml(poster)}</div>
        <div class="card-content">
          <div class="card-header">
            <div>
              <div class="card-title">${f.title}</div>
              <div class="card-meta">${f.year}</div>
              <div class="card-genre">${f.genre}</div>
            </div>
            <button class="seen-toggle ${seen ? 'active' : ''}" onclick="toggleSeen('${f.id}')">
              ${seen ? '✓ Visto' : "L'ho visto"}
            </button>
          </div>
          ${seen ? `<div class="rating-row">
            <span class="rating-label">Voto:</span>
            ${[1,2,3,4,5].map(n => `<button class="star-btn ${rating >= n ? 'lit' : ''}" onclick="setRating('${f.id}',${n})">★</button>`).join('')}
          </div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  const savedNote = state.seenMovies.length > 0 ? `<div class="saved-note">✓ ${state.seenMovies.length} film nel tuo profilo salvato</div>` : '';

  document.getElementById('app').innerHTML = `
    <h2 class="section-title">${state.round === 1 ? 'Quali di questi hai visto?' : 'E questi?'}</h2>
    <p class="section-sub">${state.round === 1 ? 'Segna i film che hai visto e daglielo un voto da 1 a 5 stelle.' : 'Basandomi sui tuoi gusti, ho selezionato questi. Hai visto qualcuno?'}</p>
    ${confBarHtml()}
    <div class="cards-grid">${cards}</div>
    <button class="btn-primary" ${canProceed ? '' : 'disabled'} onclick="proceed()">${btnLabel}</button>
    ${savedNote}`;
}

function toggleSeen(id) {
  const c = state.userChoices[id] || {};
  c.seen = !c.seen;
  if (!c.seen) c.rating = 0;
  state.userChoices[id] = c;
  saveState();
  renderRatingPhase();
}

function setRating(id, n) {
  state.userChoices[id] = state.userChoices[id] || {};
  state.userChoices[id].rating = n;
  saveState();
  renderRatingPhase();
}

// ── Proceed ──────────────────────────────────────────────────────────────────
async function proceed() {
  state.currentBatch.forEach(f => {
    const c = state.userChoices[f.id];
    if (c?.seen && c?.rating) state.seenMovies.push({ title: f.title, year: f.year, genre: f.genre, rating: c.rating });
  });
  saveState();

  const conf = calcConfidence();
  if (conf >= 70 && state.round >= 2) {
    await renderFinalRecs();
  } else {
    await renderNextBatch();
  }
}

// ── Next batch ───────────────────────────────────────────────────────────────
async function renderNextBatch() {
  state.round++;
  setPhase(2);
  document.getElementById('app').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Analizzo i tuoi gusti e scelgo i prossimi film...</div></div>`;

  try {
    const seenStr = state.seenMovies.map(m => `${m.title} (${m.year}) — voto ${m.rating}/5`).join(', ');
    const data = await callClaude(`L'utente ha visto e valutato: ${seenStr}.
Suggerisci 5 film correlati, evitando quelli già citati. Includi il tmdb_id numerico corretto per ciascuno.
Rispondi SOLO con questo JSON:
{"films":[{"id":"r1","title":"...","year":1994,"genre":"...","tmdb_id":12345}]}`);

    state.currentBatch = data.films;
    state.userChoices = {};
    state.posters = state.posters || {};

    // Fetch posters in parallel
    await Promise.all(data.films.map(async f => {
      state.posters[f.id] = await fetchPoster(f.tmdb_id, 'movie');
    }));

    saveState();
    renderRatingPhase();
  } catch(e) {
    showError('Errore nel recupero dei film. Riprova.');
  }
}

// ── Final recs ───────────────────────────────────────────────────────────────
async function renderFinalRecs() {
  setPhase(3);
  document.getElementById('app').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Costruisco il tuo profilo cinematografico e preparo i consigli finali...</div></div>`;

  try {
    const seenStr = state.seenMovies.map(m => `${m.title} — voto ${m.rating}/5`).join('; ');
    const data = await callClaude(`Sei un esperto cinematografico. L'utente ha visto e valutato: ${seenStr}.
Analizza i gusti e suggerisci 8 titoli (mix film classici, serie tv, 2 uscite recenti 2023-2026). Includi tmdb_id numerico corretto per ciascuno.
Rispondi SOLO con questo JSON:
{"profile_summary":"...","recommendations":[{"id":"rec1","title":"...","year":1994,"type":"Film","genre":"...","tmdb_id":12345,"why_badge":"4-6 parole","why_long":"2-3 frasi","plot":"1-2 frasi"}]}`);

    state.finalRecs = data;

    // Fetch posters
    state.recPosters = {};
    await Promise.all(data.recommendations.map(async r => {
      state.recPosters[r.id] = await searchPoster(r.title, r.year, r.type);
    }));

    saveState();
    renderRecsUI(data);
  } catch(e) {
    showError('Errore nella generazione dei consigli. Riprova.');
  }
}

function renderRecsUI(data) {
  const wl = state.watchList || {};
  const as = state.alreadySeen || {};
  const posters = state.recPosters || {};

  const cards = data.recommendations.map(r => {
    const watchStatus = wl[r.id];
    const alreadySeen = as[r.id];
    const poster = posters[r.id];

    let watchHtml = '';
    if (alreadySeen) {
      const rating = alreadySeen.rating || 0;
      watchHtml = `<div class="already-seen-section">
        <div class="already-seen-label">Il tuo voto:</div>
        <div class="already-seen-stars">
          ${[1,2,3,4,5].map(n => `<button class="star-btn ${rating >= n ? 'lit' : ''}" onclick="rateAlreadySeen('${r.id}',${n})">★</button>`).join('')}
        </div>
      </div>`;
    } else if (watchStatus === true) {
      watchHtml = `<span style="color:var(--green);font-size:0.85rem">✓ Aggiunto alla tua lista</span>`;
    } else if (watchStatus === false) {
      watchHtml = `<span style="color:var(--text-muted);font-size:0.85rem">Saltato</span>`;
    } else {
      watchHtml = `
        <button class="already-seen-toggle" onclick="markAlreadySeen('${r.id}')">👁 L'ho già visto</button>
        <div class="watch-actions">
          <button class="btn-watch btn-yes" onclick="markWatch('${r.id}',true)">Lo guardo ✓</button>
          <button class="btn-watch btn-no" onclick="markWatch('${r.id}',false)">Non fa per me</button>
        </div>`;
    }

    const alreadySeenBadge = alreadySeen ? `<span class="badge badge-seen">👁 Già visto</span>` : '';

    return `
    <div class="rec-card ${alreadySeen ? 'already-seen' : ''}" id="recc-${r.id}" style="${wl[r.id]===false && !alreadySeen ? 'opacity:0.4' : ''}">
      <div class="rec-top">
        <div class="rec-poster">${poster ? `<img src="${poster}" alt="poster" loading="lazy">` : `<div class="rec-poster-placeholder">🎬</div>`}</div>
        <div class="rec-header" onclick="toggleRec('${r.id}')">
          <div>
            <div class="rec-title">${r.title} <span style="font-size:0.72rem;color:var(--text-muted);font-weight:300">(${r.year})</span></div>
            <div class="rec-badges">
              <span class="badge badge-type">${r.type} · ${r.genre}</span>
              <span class="badge badge-why">✦ ${r.why_badge}</span>
              ${alreadySeenBadge}
            </div>
          </div>
          <span class="rec-expand-icon">▼</span>
        </div>
      </div>
      <div class="rec-body">
        <p><strong>Perché per te:</strong> ${r.why_long}</p>
        <p><strong>Di cosa parla:</strong> ${r.plot}</p>
        ${watchHtml}
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <h2 class="section-title">Il tuo profilo cinematografico</h2>
    <p class="section-sub">${data.profile_summary}</p>
    ${confBarHtml()}
    <h2 class="section-title" style="margin-bottom:0.3rem;margin-top:0.5rem">Film e serie da recuperare</h2>
    <p class="section-sub">Tocca un titolo per leggere perché è stato scelto per te.</p>
    ${cards}
    <div style="text-align:center;margin-top:2rem">
      <button class="restart-link" onclick="restart()">↺ Ricomincia da capo</button>
    </div>`;
}

function toggleRec(id) {
  document.getElementById('recc-' + id).classList.toggle('open');
}

function markWatch(id, yes) {
  state.watchList[id] = yes;
  saveState();
  renderRecsUI(state.finalRecs);
}

function markAlreadySeen(id) {
  state.alreadySeen[id] = { rating: 0 };
  saveState();
  renderRecsUI(state.finalRecs);
}

function rateAlreadySeen(id, n) {
  state.alreadySeen[id] = { rating: n };
  // Add to seenMovies for future analysis
  const rec = state.finalRecs.recommendations.find(r => r.id === id);
  if (rec) {
    const existing = state.seenMovies.find(m => m.title === rec.title);
    if (!existing) state.seenMovies.push({ title: rec.title, year: rec.year, genre: rec.genre, rating: n });
  }
  saveState();
  renderRecsUI(state.finalRecs);
}

function showError(msg) {
  document.getElementById('app').insertAdjacentHTML('beforeend', `<div class="error-box">${msg}</div>`);
}

function restart() {
  localStorage.removeItem(STORAGE_KEY);
  Object.assign(state, { round: 1, seenMovies: [], currentBatch: [], userChoices: {}, watchList: {}, alreadySeen: {}, finalRecs: null, posters: {}, recPosters: {} });
  setPhase(1);
  initRatingPhase();
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function initRatingPhase() {
  if (!state.currentBatch || state.currentBatch.length === 0) {
    state.currentBatch = [...starterFilms];
    state.posters = {};
    // Fetch starter posters
    await Promise.all(starterFilms.map(async f => {
      state.posters[f.id] = await fetchPoster(f.tmdb_id, 'movie');
    }));
    saveState();
  }
  renderRatingPhase();
}

if (state.finalRecs) {
  setPhase(3);
  // Re-fetch posters if missing
  if (!state.recPosters) {
    state.recPosters = {};
    Promise.all(state.finalRecs.recommendations.map(async r => {
      state.recPosters[r.id] = await searchPoster(r.title, r.year, r.type);
    })).then(() => { saveState(); renderRecsUI(state.finalRecs); });
  } else {
    renderRecsUI(state.finalRecs);
  }
} else {
  setPhase(state.round);
  initRatingPhase();
}
</script>
</body>
</html>
